server:
  port: 8080

spring:
  application:
    name: zblog2-server
  datasource:
    url: ${ZBLOG_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zblog2}
    username: ${ZBLOG_DATASOURCE_USERNAME:zblog2}
    password: ${ZBLOG_DATASOURCE_PASSWORD:zblog2}
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html

zblog:
  security:
    jwt-secret: ${ZBLOG_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    token-ttl-minutes: ${ZBLOG_TOKEN_TTL_MINUTES:120}
    bootstrap-admin:
      username: ${ZBLOG_ADMIN_USERNAME:admin}
      password: ${ZBLOG_ADMIN_PASSWORD:admin123456}
